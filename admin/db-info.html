<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据库信息</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #0a0e1a 0%, #0f172a 50%, #1e293b 100%);
            color: #e2e8f0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: #22d3ee;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(34, 211, 238, 0.3);
        }

        .card {
            background: rgba(30, 41, 59, 0.6);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(6, 182, 212, 0.1);
            backdrop-filter: blur(10px);
        }

        h2 {
            font-size: 18px;
            color: #e2e8f0;
            margin-bottom: 16px;
            border-bottom: 2px solid rgba(6, 182, 212, 0.2);
            padding-bottom: 12px;
        }

        h3 {
            color: #22d3ee;
            margin-bottom: 12px;
        }

        pre {
            background: rgba(15, 23, 42, 0.8);
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 14px;
            line-height: 1.5;
            border: 1px solid rgba(6, 182, 212, 0.1);
            color: #94a3b8;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 16px;
        }

        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid rgba(6, 182, 212, 0.1);
        }

        th {
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.1) 0%, rgba(34, 211, 238, 0.05) 100%);
            font-weight: 600;
            color: #22d3ee;
        }

        td {
            color: #94a3b8;
        }

        tr:hover {
            background: rgba(6, 182, 212, 0.05);
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: #64748b;
        }

        .loading-spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(6, 182, 212, 0.2);
            border-top: 3px solid #22d3ee;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 12px;
            box-shadow: 0 0 10px rgba(34, 211, 238, 0.3);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            color: #f87171;
            padding: 12px 16px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(239, 68, 68, 0.2);
            margin-bottom: 20px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #0891b2 0%, #06b6d4 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.4);
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.6);
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="dashboard.html" class="back-btn">← 返回后台</a>
        <h1>数据库信息</h1>

        <div class="card">
            <h2>数据库概览</h2>
            <div id="dbOverview" class="loading">
                <div class="loading-spinner"></div>
                <span>加载中...</span>
            </div>
        </div>

        <div class="card">
            <h2>表结构</h2>
            <div id="tablesList"></div>
        </div>
    </div>

    <script>
        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', function() {
            loadDatabaseInfo();
        });

        // 加载数据库信息
        async function loadDatabaseInfo() {
            try {
                // 发送请求获取数据库信息
                const response = await fetch('/jg/api/get-db-info.php');
                const data = await response.json();

                if (data.success) {
                    // 显示数据库概览
                    displayDatabaseOverview(data.info);

                    // 显示表结构
                    displayTablesList(data.tables);
                } else {
                    document.getElementById('dbOverview').innerHTML = '<div class="error">' + data.error + '</div>';
                }
            } catch (error) {
                console.error('加载数据库信息失败:', error);
                document.getElementById('dbOverview').innerHTML = '<div class="error">加载数据库信息失败: ' + error.message + '</div>';
            }
        }

        // 显示数据库概览
        function displayDatabaseOverview(info) {
            const dbOverview = document.getElementById('dbOverview');
            dbOverview.innerHTML = `
                <table>
                    <tr>
                        <th>项目</th>
                        <th>值</th>
                    </tr>
                    <tr>
                        <td>数据库路径</td>
                        <td>${info.path}</td>
                    </tr>
                    <tr>
                        <td>数据库大小</td>
                        <td>${(info.size / 1024).toFixed(2)} KB</td>
                    </tr>
                    <tr>
                        <td>表数量</td>
                        <td>${info.tables.length}</td>
                    </tr>
                    <tr>
                        <td>表名</td>
                        <td>${info.tables.join(', ')}</td>
                    </tr>
                </table>
            `;
        }

        // 显示表结构
        function displayTablesList(tables) {
            const tablesList = document.getElementById('tablesList');

            if (tables.length === 0) {
                tablesList.innerHTML = '<p style="color: #64748b;">暂无表数据</p>';
                return;
            }

            tables.forEach(table => {
                const tableCard = document.createElement('div');
                tableCard.className = 'card';
                tableCard.innerHTML = `
                    <h3>${table.name} (${table.count} 条记录)</h3>
                    <table>
                        <tr>
                            <th>字段名</th>
                            <th>类型</th>
                            <th>是否主键</th>
                            <th>是否可为空</th>
                        </tr>
                        ${table.columns.map(col => `
                            <tr>
                                <td>${col.name}</td>
                                <td>${col.type}</td>
                                <td>${col.pk ? '是' : '否'}</td>
                                <td>${col.notnull ? '否' : '是'}</td>
                            </tr>
                        `).join('')}
                    </table>
                `;
                tablesList.appendChild(tableCard);
            });
        }
    </script>
</body>
</html>
